<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Auto Survey Form</title>

<style>
* {
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  margin: 0;
  background: linear-gradient(135deg, #f7971e, #ffd200);
  display: flex;
  justify-content: center;
  padding: 20px;
}

.container {
  background: rgba(255, 255, 255, 0.95);
  width: 100%;
  max-width: 950px;
  padding: 30px;
  border-radius: 18px;
  box-shadow: 0 10px 35px rgba(0,0,0,0.2);
  color: #222;
}

h2 {
  text-align: center;
  margin-bottom: 25px;
  font-weight: 700;
  color: #333;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}

.form-group {
  display: flex;
  flex-direction: column;
}

label {
  font-size: 13px;
  margin-bottom: 6px;
  font-weight: 600;
  color: #444;
}

input, select {
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 14px;
  transition: 0.3s;
}

input:focus, select:focus {
  border-color: #f7971e;
  box-shadow: 0 0 0 2px rgba(247,151,30,0.2);
  outline: none;
}

input:read-only {
  background-color: #f2f2f2;
  cursor: not-allowed;
}

button {
  margin-top: 25px;
  padding: 14px;
  border: none;
  background: linear-gradient(90deg, #ff512f, #f09819);
  color: white;
  font-size: 16px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s ease;
  font-weight: 600;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

.message {
  margin-top: 15px;
  text-align: center;
  font-weight: bold;
}

@media(max-width: 768px){
  .form-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="container">
  <h2>Auto Driver Survey</h2>

  <form id="surveyForm">
    <div class="form-grid">

      <div class="form-group">
        <label>City</label>
        <input name="city" required>
      </div>

      <div class="form-group">
        <label>District</label>
        <select name="district" required>
          <option value="">Select District</option>
          <option>Chennai</option>
          <option>Coimbatore</option>
          <option>Madurai</option>
          <option>Salem</option>
          <option>Tiruchirappalli</option>
        </select>
      </div>

      <div class="form-group">
        <label>Survey Person ID</label>
        <input name="survey_person_id" required>
      </div>

      <div class="form-group">
        <label>Name</label>
        <input name="name">
      </div>

      <div class="form-group">
        <label>Gender</label>
        <select name="gender" required>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="prefer_not_to_say">Prefer Not To Say</option>
        </select>
      </div>

      <div class="form-group">
        <label>Mobile Number</label>
        <input name="mobile_number" required>
      </div>

      <div class="form-group">
        <label>Vehicle Type</label>
        <select name="vehicle_type" id="vehicleType" required>
          <option value="">Select</option>
          <option value="own">Own</option>
          <option value="rental">Rental</option>
        </select>
      </div>

      <div class="form-group">
        <label>Investment (Rs)</label>
        <input type="number" name="investment_rs" id="investmentField">
      </div>

      <div class="form-group">
        <label>Rental Amount (Rs)</label>
        <input type="number" name="rental_amount_rs" id="rentalField">
      </div>

      <div class="form-group">
        <label>Daily Income</label>
        <input type="number" name="daily_income">
      </div>

      <div class="form-group">
        <label>Petrol Expense</label>
        <input type="number" name="petrol_expense">
      </div>

      <div class="form-group">
        <label>Peak Start Time</label>
        <select name="peak_start_time" id="startTime" required>
          <option value="">Start Time</option>
          <option>6 AM</option>
          <option>7 AM</option>
          <option>8 AM</option>
          <option>9 AM</option>
          <option>10 AM</option>
          <option>11 AM</option>
          <option>12 PM</option>
          <option>1 PM</option>
          <option>2 PM</option>
          <option>3 PM</option>
          <option>4 PM</option>
          <option>5 PM</option>
          <option>6 PM</option>
          <option>7 PM</option>
          <option>8 PM</option>
          <option>9 PM</option>
        </select>
      </div>

      <div class="form-group">
        <label>Peak End Time</label>
        <select name="peak_end_time" id="endTime" required>
          <option value="">End Time</option>
          <option>6 AM</option>
          <option>7 AM</option>
          <option>8 AM</option>
          <option>9 AM</option>
          <option>10 AM</option>
          <option>11 AM</option>
          <option>12 PM</option>
          <option>1 PM</option>
          <option>2 PM</option>
          <option>3 PM</option>
          <option>4 PM</option>
          <option>5 PM</option>
          <option>6 PM</option>
          <option>7 PM</option>
          <option>8 PM</option>
          <option>9 PM</option>
        </select>
      </div>

    </div>

    <button type="submit">Submit Survey</button>
    <div class="message" id="message"></div>
  </form>
</div>

<script>
const vehicleType = document.getElementById("vehicleType");
const investmentField = document.getElementById("investmentField");
const rentalField = document.getElementById("rentalField");

vehicleType.addEventListener("change", function () {

  if (this.value === "own") {
    rentalField.value = 0;
    rentalField.readOnly = true;
    investmentField.readOnly = false;
  }

  if (this.value === "rental") {
    investmentField.value = 0;
    investmentField.readOnly = true;
    rentalField.readOnly = false;
  }
});

// Validate peak time order
document.getElementById("surveyForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const start = document.getElementById("startTime").selectedIndex;
  const end = document.getElementById("endTime").selectedIndex;

  if (start >= end) {
    alert("Peak End Time must be after Start Time");
    return;
  }

  const formData = new FormData(this);
  const data = Object.fromEntries(formData.entries());

  const response = await fetch("/survey", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  const result = await response.json();
  const messageDiv = document.getElementById("message");

  if(response.status === 201){
    messageDiv.style.color = "green";
    messageDiv.textContent = "✔ Survey submitted successfully!";
    this.reset();
    rentalField.readOnly = false;
    investmentField.readOnly = false;
  } else {
    messageDiv.style.color = "red";
    messageDiv.textContent = result.error || "Something went wrong";
  }
});
</script>

</body>
</html>
