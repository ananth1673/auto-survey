<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Auto Survey Form</title>

<style>
* {
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  margin: 0;
  background: linear-gradient(135deg, #f7971e, #ffd200);
  display: flex;
  justify-content: center;
  padding: 20px;
}

.container {
  background: rgba(255, 255, 255, 0.95);
  width: 100%;
  max-width: 950px;
  padding: 30px;
  border-radius: 18px;
  box-shadow: 0 10px 35px rgba(0,0,0,0.2);
  color: #222;
}

h2 {
  text-align: center;
  margin-bottom: 25px;
  font-weight: 700;
  letter-spacing: 1px;
  color: #333;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}

.form-group {
  display: flex;
  flex-direction: column;
}

label {
  font-size: 13px;
  margin-bottom: 6px;
  font-weight: 600;
  color: #444;
}

input, select {
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 14px;
  transition: 0.3s;
}

input:focus, select:focus {
  border-color: #f7971e;
  box-shadow: 0 0 0 2px rgba(247,151,30,0.2);
  outline: none;
}

button {
  margin-top: 25px;
  padding: 14px;
  border: none;
  background: linear-gradient(90deg, #ff512f, #f09819);
  color: white;
  font-size: 16px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s ease;
  font-weight: 600;
  letter-spacing: 1px;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

.message {
  margin-top: 15px;
  text-align: center;
  font-weight: bold;
}

/* Mobile Responsive */
@media(max-width: 768px){
  .form-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="container">
  <h2> Auto Driver Survey</h2>

  <form id="surveyForm">
    <div class="form-grid">

      <div class="form-group">
        <label>City</label>
        <input name="city" required>
      </div>
<div class="form-group">
  <label>District (Tamil Nadu)</label>
  <select name="district" required>
    <option value="">Select District</option>
    <option>Ariyalur</option>
    <option>Chengalpattu</option>
    <option>Chennai</option>
    <option>Coimbatore</option>
    <option>Cuddalore</option>
    <option>Dharmapuri</option>
    <option>Dindigul</option>
    <option>Erode</option>
    <option>Kallakurichi</option>
    <option>Kanchipuram</option>
    <option>Kanyakumari</option>
    <option>Karur</option>
    <option>Krishnagiri</option>
    <option>Madurai</option>
    <option>Mayiladuthurai</option>
    <option>Nagapattinam</option>
    <option>Namakkal</option>
    <option>Nilgiris</option>
    <option>Perambalur</option>
    <option>Pudukkottai</option>
    <option>Ramanathapuram</option>
    <option>Ranipet</option>
    <option>Salem</option>
    <option>Sivaganga</option>
    <option>Tenkasi</option>
    <option>Thanjavur</option>
    <option>Theni</option>
    <option>Thoothukudi</option>
    <option>Tiruchirappalli</option>
    <option>Tirunelveli</option>
    <option>Tirupathur</option>
    <option>Tiruppur</option>
    <option>Tiruvallur</option>
    <option>Tiruvannamalai</option>
    <option>Tiruvarur</option>
    <option>Vellore</option>
    <option>Viluppuram</option>
    <option>Virudhunagar</option>
  </select>
</div>
      <div class="form-group">
        <label>Survey Person ID</label>
        <input name="survey_person_id" required>
      </div>

      <div class="form-group">
        <label>Name</label>
        <input name="name">
      </div>

      <div class="form-group">
        <label>Gender</label>
        <select name="gender">
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="prefer_not_to_say">Prefer Not To Say</option>
        </select>
      </div>

      <div class="form-group">
        <label>Mobile Number</label>
        <input name="mobile_number" required>
      </div>

      <div class="form-group">
        <label>Number Plate</label>
        <input name="number_plate">
      </div>

      <div class="form-group">
        <label>Vehicle Type</label>
        <select name="vehicle_type">
          <option value="own">Own</option>
          <option value="rental">Rental</option>
        </select>
      </div>

      <div class="form-group">
        <label>Investment (Rs)</label>
        <input type="number" name="investment_rs">
      </div>

      <div class="form-group">
        <label>Rental Amount (Rs)</label>
        <input type="number" name="rental_amount_rs">
      </div>

      <div class="form-group">
        <label>Auto Value</label>
        <input type="number" name="auto_value">
      </div>

      <div class="form-group">
        <label>Daily KM</label>
        <input type="number" name="daily_km">
      </div>

      <div class="form-group">
        <label>Petrol Expense</label>
        <input type="number" name="petrol_expense">
      </div>

      <div class="form-group">
        <label>Daily Income</label>
        <input type="number" name="daily_income">
      </div>

      <div class="form-group">
        <label>Maintenance / Month</label>
        <input type="number" name="maintenance_month">
      </div>

      <div class="form-group">
        <label>Profit</label>
        <input type="number" name="profit">
      </div>

      <div class="form-group">
  <label>Peak Start Time</label>
  <select name="peak_start_time" required>
    <option value="">Select Start Time</option>
    <option>12 AM</option>
    <option>1 AM</option>
    <option>2 AM</option>
    <option>3 AM</option>
    <option>4 AM</option>
    <option>5 AM</option>
    <option>6 AM</option>
    <option>7 AM</option>
    <option>8 AM</option>
    <option>9 AM</option>
    <option>10 AM</option>
    <option>11 AM</option>
    <option>12 PM</option>
    <option>1 PM</option>
    <option>2 PM</option>
    <option>3 PM</option>
    <option>4 PM</option>
    <option>5 PM</option>
    <option>6 PM</option>
    <option>7 PM</option>
    <option>8 PM</option>
    <option>9 PM</option>
    <option>10 PM</option>
    <option>11 PM</option>
  </select>
</div>

<div class="form-group">
  <label>Peak End Time</label>
  <select name="peak_end_time" required>
    <option value="">Select End Time</option>
    <option>12 AM</option>
    <option>1 AM</option>
    <option>2 AM</option>
    <option>3 AM</option>
    <option>4 AM</option>
    <option>5 AM</option>
    <option>6 AM</option>
    <option>7 AM</option>
    <option>8 AM</option>
    <option>9 AM</option>
    <option>10 AM</option>
    <option>11 AM</option>
    <option>12 PM</option>
    <option>1 PM</option>
    <option>2 PM</option>
    <option>3 PM</option>
    <option>4 PM</option>
    <option>5 PM</option>
    <option>6 PM</option>
    <option>7 PM</option>
    <option>8 PM</option>
    <option>9 PM</option>
    <option>10 PM</option>
    <option>11 PM</option>
  </select>
</div>

      <div class="form-group">
        <label>No. of Autos in City</label>
        <input type="number" name="autos_in_city">
      </div>

      <div class="form-group">
        <label>Night Ride Acceptance</label>
        <select name="night_ride_acceptance">
          <option value="true">Yes</option>
          <option value="false">No</option>
        </select>
      </div>

      <div class="form-group">
        <label>Run Days Per Month</label>
        <input type="number" name="run_days_per_month">
      </div>

    </div>

    <button type="submit">Submit Survey</button>
    <div class="message" id="message"></div>
  </form>
</div>

<script>
document.getElementById("surveyForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const formData = new FormData(this);
  const data = Object.fromEntries(formData.entries());
  data.night_ride_acceptance = data.night_ride_acceptance === "true";

  const response = await fetch("/survey", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  const result = await response.json();
  const messageDiv = document.getElementById("message");

  if(response.status === 201){
    messageDiv.style.color = "green";
    messageDiv.textContent = "✔ Survey submitted successfully!";
    this.reset();
  } else {
    messageDiv.style.color = "red";
    messageDiv.textContent = result.error || "Something went wrong";
  }
});
</script>

</body>
</html>
